<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Автомобили</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h2>Автомобили</h2>

        <ul id="menu">
            <li onclick="selectCar(0)">BMW</li>
            <li onclick="selectCar(1)">Mercedes</li>
            <li onclick="selectCar(2)">Audi</li>
            <li onclick="selectCar(3)">Toyota</li>
            <li onclick="selectCar(4)">Ford</li>
        </ul>

        <p id="pointer"><span class="wheel-icon">⚙️</span> Выбрано: BMW</p>

        <img id="myImage">

        <div id="imageCounter" class="image-counter">1 / 3</div>

        <br><br>
        <button class="start-btn" onclick="startShow()">Начать снова</button>
        <button class="stop-btn" onclick="stopShow()">Остановить</button>
    </div>

    <script>
        const cars = [{
            name: "BMW",
            images: ["img/bmw1.jfif", "img/bmw2.jfif", "img/bmw3.jfif"]
        }, {
            name: "Mercedes",
            images: ["img/mercedes1.jfif", "img/mercedes2.jfif", "img/mercedes3.jfif"]
        }, {
            name: "Audi",
            images: ["img/audi1.jfif", "img/audi2.jfif", "img/audi3.jfif"]
        }, {
            name: "Toyota",
            images: ["img/toyota1.jfif", "img/toyota2.jfif", "img/toyota3.jfif"]
        }, {
            name: "Ford",
            images: ["img/ford1.jfif", "img/ford2.jfif", "img/ford3.jfif"]
        }];

        let currentCar = 0;
        let currentImg = 0;
        let interval = null;

        function selectCar(index) {
            currentCar = index;
            currentImg = 0;
            document.getElementById("pointer").innerHTML = "<span class='wheel-icon'>⚙️</span> Выбрано: " + cars[index].name;

            let menuItems = document.querySelectorAll("#menu li");
            for (let i = 0; i < menuItems.length; i++) {
                menuItems[i].classList.remove("active");
            }
            menuItems[index].classList.add("active");

            showImage();
            updateCounter();
        }

        function showImage() {
            let img = cars[currentCar].images[currentImg];
            document.getElementById("myImage").src = img;
        }

        function nextImage() {
            if (currentImg == 0) {
                currentImg = 1;
            } else if (currentImg == 1) {
                currentImg = 2;
            } else {
                currentImg = 0;
            }
            showImage();
            updateCounter();
        }

        function updateCounter() {
            document.getElementById("imageCounter").innerHTML = (currentImg + 1) + " / 3";
        }

        function startShow() {
            if (interval != null) {
                clearInterval(interval);
            }
            interval = setInterval(nextImage, 2000);
        }

        function stopShow() {
            if (interval != null) {
                clearInterval(interval);
                interval = null;
            }
        }

        window.onload = function() {
            selectCar(0);
            startShow();
        };
    </script>

</body>

</html>
